name: Android Binary Release

# Builds the Android (arm64-v8a) shared library and publishes it as a GitHub
# release asset.
#
#  * release.published   -> attach libcactus.so to the release being published
#  * workflow_dispatch    -> manual run; creates the release if it does not exist
#                            (tag defaults to the contents of CACTUS_VERSION)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the binary to (created if missing). Defaults to CACTUS_VERSION."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure Android NDK
        run: |
          if [ -z "${ANDROID_NDK_LATEST_HOME:-}" ]; then
            echo "::error::ANDROID_NDK_LATEST_HOME is not set on this runner"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "Using NDK at $ANDROID_NDK_LATEST_HOME"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build Android binary (arm64-v8a)
        run: bash android/build.sh

      - name: Stage release artifact
        id: stage
        run: |
          set -euo pipefail
          test -f android/libcactus.so
          mkdir -p dist
          strip_bin=$(ls "$ANDROID_NDK_HOME"/toolchains/llvm/prebuilt/*/bin/llvm-strip 2>/dev/null | head -1)
          out=dist/libcactus-android-arm64-v8a.so
          if [ -n "$strip_bin" ]; then
            "$strip_bin" --strip-debug android/libcactus.so -o "$out"
            echo "Stripped debug info with $strip_bin"
          else
            cp android/libcactus.so "$out"
            echo "llvm-strip not found; shipping unstripped binary"
          fi
          ( cd dist && sha256sum libcactus-android-arm64-v8a.so > libcactus-android-arm64-v8a.so.sha256 )
          ls -lh dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-android-arm64-v8a
          path: dist/*
          if-no-files-found: error

      - name: Resolve release tag
        id: tag
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$EVENT_TAG" ]; then
            tag="$EVENT_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag=$(tr -d '[:space:]' < CACTUS_VERSION)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Publish to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --target "$GITHUB_SHA" \
              --notes "Automated Android \`arm64-v8a\` build of \`libcactus.so\`."
          fi
          gh release upload "$TAG" \
            dist/libcactus-android-arm64-v8a.so \
            dist/libcactus-android-arm64-v8a.so.sha256 \
            --clobber
          echo "Uploaded Android binary to release $TAG"

  transpile:
    # Produces the loadable model bundle. Transpilation builds the Cactus host
    # runtime, whose NEON kernels only compile on ARM — so this MUST run on an
    # arm64 runner. The bundle is cached as a release asset; subsequent runs
    # skip the heavy transpile entirely.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$EVENT_TAG" ]; then tag="$EVENT_TAG"
          elif [ -n "$INPUT_TAG" ]; then tag="$INPUT_TAG"
          else tag=$(tr -d '[:space:]' < CACTUS_VERSION); fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Catalog of models to host as release bundles: "<bundle-id>:<hf-model-id>".
      # The app embeds the first (default) and downloads the rest on demand.
      - name: Determine missing bundles
        id: missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          MODELS="lfm2.5-350m-int4:LiquidAI/LFM2.5-350M qwen3-1.7b-int4:Qwen/Qwen3-1.7B lfm2-vl-450m-int4:LiquidAI/LFM2-VL-450M lfm2.5-vl-1.6b-int4:LiquidAI/LFM2.5-VL-1.6B nomic-embed-v2-int4:nomic-ai/nomic-embed-text-v2-moe"
          assets=$(gh release view "$TAG" 2>/dev/null || true)
          missing=""
          for m in $MODELS; do
            id="${m%%:*}"
            echo "$assets" | grep -q "${id}-bundle.zip" || missing="$missing $m"
          done
          missing="$(echo $missing | xargs)"
          echo "list=$missing" >> "$GITHUB_OUTPUT"
          [ -n "$missing" ] && echo "any=true" >> "$GITHUB_OUTPUT" || echo "any=false" >> "$GITHUB_OUTPUT"
          echo "Missing bundles: ${missing:-(none)}"

      - name: Install Python toolchain
        if: steps.missing.outputs.any == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.12-venv cmake build-essential zip libcurl4-openssl-dev
          python3.12 -m venv venv
          venv/bin/pip install --upgrade pip -q
          # arm64 PyPI serves CPU torch wheels by default.
          venv/bin/pip install -r python/requirements.txt -q
          venv/bin/pip install -e python -q
          # nomic-embed (RAG embedder) remote modeling code needs einops.
          venv/bin/pip install einops -q

      - name: Transpile missing bundles and upload to release
        if: steps.missing.outputs.any == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          CACTUS_NO_CLOUD_TELE: "1"
          HF_HUB_DISABLE_XET: "1"
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          set -euo pipefail
          export PATH="$GITHUB_WORKSPACE/venv/bin:$PATH"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" \
              --notes "Automated Cactus Android build." || true
          fi
          for m in ${{ steps.missing.outputs.list }}; do
            id="${m%%:*}"; hf="${m##*:}"
            echo "::group::Transpiling $hf -> $id"
            python flutter/example/tools/transpile_model.py "$hf" "weights/$id" 4
            test -f "weights/$id/components/manifest.json"
            ( cd "weights/$id" && zip -r -1 -q "$GITHUB_WORKSPACE/${id}-bundle.zip" . -x '*.zip' )
            gh release upload "$TAG" "${id}-bundle.zip" --clobber
            # Free disk before the next (possibly multi-GB) model.
            rm -rf "weights/$id" "${id}-bundle.zip" ~/.cache/huggingface
            echo "::endgroup::"
          done

  apk:
    # Builds the Flutter demo chat app into an installable APK and attaches it to
    # the release. The model bundle is produced by the `transpile` job and
    # fetched from the release here (the APK build cross-compiles fine on x86).
    needs: transpile
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Configure Android NDK
        run: |
          if [ -z "${ANDROID_NDK_LATEST_HOME:-}" ]; then
            echo "::error::ANDROID_NDK_LATEST_HOME is not set on this runner"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build FFI libcactus.so into jniLibs
        run: bash flutter/example/native/build.sh

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve release tag
        id: tag
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$EVENT_TAG" ]; then
            tag="$EVENT_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag=$(tr -d '[:space:]' < CACTUS_VERSION)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # No model is bundled into the APK — the app downloads models (including
      # the default) from the GitHub release on demand to keep the APK small.

      - name: Build APK
        working-directory: flutter/example
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          flutter pub get
          # The baked-in tag powers the in-app "new version available" banner.
          flutter build apk --release --target-platform android-arm64 \
            --dart-define=EVA_RELEASE_TAG="$TAG"

      - name: Stage APK
        run: |
          set -euo pipefail
          mkdir -p dist
          cp flutter/example/build/app/outputs/flutter-apk/app-release.apk \
             dist/cactus-android-arm64-v8a.apk
          ( cd dist && sha256sum cactus-android-arm64-v8a.apk > cactus-android-arm64-v8a.apk.sha256 )
          ls -lh dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cactus-android-apk
          path: dist/cactus-android-arm64-v8a.apk*
          if-no-files-found: error

      - name: Publish APK to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" \
              --notes "Automated Cactus Android build." || true
          fi
          gh release upload "$TAG" \
            dist/cactus-android-arm64-v8a.apk \
            dist/cactus-android-arm64-v8a.apk.sha256 \
            --clobber
          echo "Uploaded APK to release $TAG"
