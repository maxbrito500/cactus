name: Android Binary Release

# Builds the Android (arm64-v8a) shared library and publishes it as a GitHub
# release asset.
#
#  * release.published   -> attach libcactus.so to the release being published
#  * workflow_dispatch    -> manual run; creates the release if it does not exist
#                            (tag defaults to the contents of CACTUS_VERSION)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the binary to (created if missing). Defaults to CACTUS_VERSION."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure Android NDK
        run: |
          if [ -z "${ANDROID_NDK_LATEST_HOME:-}" ]; then
            echo "::error::ANDROID_NDK_LATEST_HOME is not set on this runner"
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "Using NDK at $ANDROID_NDK_LATEST_HOME"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Build Android binary (arm64-v8a)
        run: bash android/build.sh

      - name: Stage release artifact
        id: stage
        run: |
          set -euo pipefail
          test -f android/libcactus.so
          mkdir -p dist
          strip_bin=$(ls "$ANDROID_NDK_HOME"/toolchains/llvm/prebuilt/*/bin/llvm-strip 2>/dev/null | head -1)
          out=dist/libcactus-android-arm64-v8a.so
          if [ -n "$strip_bin" ]; then
            "$strip_bin" --strip-debug android/libcactus.so -o "$out"
            echo "Stripped debug info with $strip_bin"
          else
            cp android/libcactus.so "$out"
            echo "llvm-strip not found; shipping unstripped binary"
          fi
          ( cd dist && sha256sum libcactus-android-arm64-v8a.so > libcactus-android-arm64-v8a.so.sha256 )
          ls -lh dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcactus-android-arm64-v8a
          path: dist/*
          if-no-files-found: error

      - name: Resolve release tag
        id: tag
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$EVENT_TAG" ]; then
            tag="$EVENT_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag=$(tr -d '[:space:]' < CACTUS_VERSION)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Publish to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --target "$GITHUB_SHA" \
              --notes "Automated Android \`arm64-v8a\` build of \`libcactus.so\`."
          fi
          gh release upload "$TAG" \
            dist/libcactus-android-arm64-v8a.so \
            dist/libcactus-android-arm64-v8a.so.sha256 \
            --clobber
          echo "Uploaded Android binary to release $TAG"
